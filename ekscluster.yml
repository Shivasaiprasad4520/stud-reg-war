apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: stud-reg-cluster
  region: us-east-1
  version: "1.30"

managedNodeGroups:
  - name: standard-nodes
    instanceType: m7i-flex.large
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20
    ssh:
      allow: true
      publicKeyName: host-key
